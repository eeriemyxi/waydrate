name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload (${{ matrix.build }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: waydrate
            asset_name: waydrate-linux-amd64

          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin
            binary_name: waydrate
            asset_name: waydrate-macos-amd64

          - build: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin
            binary_name: waydrate
            asset_name: waydrate-macos-arm64

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: waydrate.exe
            asset_name: waydrate-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build the binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename the binary
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.binary_name }} ${{ matrix.asset_name }}
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          name: Release ${{ github.ref_name }}
